name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ cmake

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scikit-learn ripser persim fastapi uvicorn pydantic httpx pytest

      - name: Run test suite
        run: |
          pytest tests/test_features.py tests/test_models.py tests/test_drift.py -v --tb=short

      - name: Build Docker image
        run: |
          docker build -t toposentinel:ci .
